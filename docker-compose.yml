version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: lessonscounter_mongodb
    restart: always
    networks:
      - wedding-network
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lessonscounter_backend
    restart: always
    depends_on:
      - mongodb
    networks:
      - wedding-network
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/lessons_counter
      - JWT_SECRET=your_super_secret_jwt_key_here
      - EMAIL_USER=your_email@gmail.com
      - EMAIL_PASS=your_email_app_password
      - FRONTEND_URL=http://localhost

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lessonscounter_frontend
    restart: always
    networks:
      - wedding-network
    depends_on:
      - backend

volumes:
  mongodb_data:

networks:
  wedding-network:
    name: wedding-network
