# HTTP → HTTPS redirect (Certbot)
server {
    listen 80;
    server_name lessoncounter.chickenkiller.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS основной сервер
server {
    listen 443 ssl http2;
    server_name lessoncounter.chickenkiller.com;

    # SSL (Certbot добавил)
    ssl_certificate /etc/letsencrypt/live/lessoncounter.chickenkiller.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lessoncounter.chickenkiller.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Frontend - REVERSE PROXY (НЕ static files!)
    location / {
        proxy_pass http://lessonscounter_frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/ {
        proxy_pass http://lessonscounter_backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
