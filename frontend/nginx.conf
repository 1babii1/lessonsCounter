server {
    server_name lessoncounter.chickenkiller.com;

    # Frontend SPA routing (React/Expo)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location / {
        proxy_pass http://lessonscounter_frontend:80;  # ✅ Правильное имя контейнера
    }

    # Proxy API requests to lessonscounter_backend service
    location /api/ {
        proxy_pass http://lessonscounter_backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/lessoncounter.chickenkiller.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/lessoncounter.chickenkiller.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = lessoncounter.chickenkiller.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

}